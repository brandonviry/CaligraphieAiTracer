name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests & Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test --all

      - name: Package (dist)
        run: powershell -ExecutionPolicy Bypass -File scripts/package.ps1 -SkipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calligraphie-ai-tracer-windows
          path: dist/CaligraphieAiTracer-*/
          if-no-files-found: error
